<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>You're on the list — Current at UBC</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy: #0D2145;
      --navy-mid: #1A3461;
      --accent: #4A90C4;
      --light: #C8D8F0;
      --white: #ffffff;
    }

    html, body {
      height: 100%;
      background: var(--navy);
      color: var(--white);
      font-family: 'DM Sans', sans-serif;
      overflow: hidden;
    }

    .bg {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 20% 50%, #1a3461 0%, #0D2145 60%);
      z-index: 0;
    }

    .wave-ring {
      position: fixed;
      border-radius: 50%;
      border: 1px solid rgba(74, 144, 196, 0.15);
      animation: expand 6s ease-out infinite;
    }
    .wave-ring:nth-child(1) { width: 200px; height: 200px; top: 50%; left: 50%; transform: translate(-50%, -50%); animation-delay: 0s; }
    .wave-ring:nth-child(2) { width: 200px; height: 200px; top: 50%; left: 50%; transform: translate(-50%, -50%); animation-delay: 1.5s; }
    .wave-ring:nth-child(3) { width: 200px; height: 200px; top: 50%; left: 50%; transform: translate(-50%, -50%); animation-delay: 3s; }
    .wave-ring:nth-child(4) { width: 200px; height: 200px; top: 50%; left: 50%; transform: translate(-50%, -50%); animation-delay: 4.5s; }

    @keyframes expand {
      0%   { width: 100px; height: 100px; opacity: 0.6; }
      100% { width: 900px; height: 900px; opacity: 0; }
    }

    .container {
      position: relative;
      z-index: 10;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 24px;
      gap: 0;
    }

    .logo {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      margin-bottom: 28px;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.1s;
    }

    .check {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: rgba(74, 144, 196, 0.15);
      border: 1.5px solid var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 28px;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.3s;
    }

    .check svg {
      width: 22px;
      height: 22px;
      stroke: var(--accent);
      stroke-width: 2.5;
      fill: none;
      stroke-dasharray: 40;
      stroke-dashoffset: 40;
      animation: drawCheck 0.6s ease forwards 0.9s;
    }

    @keyframes drawCheck {
      to { stroke-dashoffset: 0; }
    }

    .eyebrow {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 14px;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.5s;
    }

    h1 {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(48px, 10vw, 76px);
      font-weight: 800;
      line-height: 0.95;
      letter-spacing: -0.01em;
      text-transform: uppercase;
      color: var(--white);
      margin-bottom: 22px;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.65s;
    }

    h1 span { color: var(--accent); }

    .body {
      font-size: 15px;
      font-weight: 300;
      line-height: 1.75;
      color: var(--light);
      max-width: 400px;
      margin-bottom: 36px;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.8s;
    }

    .btn {
      display: inline-block;
      background: transparent;
      border: 1.5px solid rgba(255,255,255,0.3);
      color: var(--white);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      padding: 12px 28px;
      border-radius: 8px;
      text-decoration: none;
      letter-spacing: 0.02em;
      margin-bottom: 36px;
      transition: border-color 0.2s, background 0.2s;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.95s;
    }

    .btn:hover {
      border-color: var(--accent);
      background: rgba(74, 144, 196, 0.1);
    }

    .divider {
      width: 36px;
      height: 1px;
      background: var(--accent);
      margin: 0 auto 28px;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 1.05s;
    }

    .social {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: rgba(255,255,255,0.4);
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 1.15s;
    }

    .social a {
      color: var(--light);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s;
    }

    .social a:hover { color: var(--white); }

    .footer {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 10px;
      color: rgba(255,255,255,0.2);
      letter-spacing: 0.06em;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 1.3s;
      white-space: nowrap;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
